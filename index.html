<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Marçal Bot SGP-SEDE</title>
  <style>
    :root {
      --wa-dark: #075E54; --wa-teal: #128C7E; --wa-chat-bg: #E5DDD5;
      --wa-msg-user: #DCF8C6; --wa-msg-bot: #FFFFFF; --wa-text: #111B21;
      --radius: 12px; --shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Segoe UI, Arial, sans-serif; background-color: var(--wa-chat-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    header { background-color: var(--wa-dark); color: #fff; padding: 15px; text-align: center; }
    .chat-area { flex: 1; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; margin: 6px 0; font-size: 15px; line-height: 1.5; box-shadow: var(--shadow); }
    .msg.user { align-self: flex-end; background: var(--wa-msg-user); border-top-right-radius: 0; }
    .msg.bot { align-self: flex-start; background: var(--wa-msg-bot); border-top-left-radius: 0; }
    
    /* BOTÕES DINÂMICOS */
    .dynamic-button {
      display: inline-block; padding: 8px 12px; margin: 5px 4px; border-radius: 20px;
      border: 1.5px solid var(--wa-teal); background: white; color: var(--wa-teal);
      font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s;
    }
    .dynamic-button:hover { background: var(--wa-teal); color: white; }

    .footer-bar { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; }
    .input-wrapper { flex: 1; background: #fff; border-radius: 25px; padding: 5px 15px; }
    .input-wrapper input { width: 100%; border: none; padding: 10px 0; outline: none; }
    .send-btn { background: var(--wa-teal); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    .view-card { background: #fff; border-radius: var(--radius); padding: 25px; width: 90%; max-width: 400px; margin: 50px auto; }
    .form-input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <header>SGP-SEDE</header>
  <main style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <section id="view-1" class="view-card">
      <input id="nome" class="form-input" placeholder="Seu nome">
      <button onclick="startApp()" style="width:100%; padding:15px; background:var(--wa-teal); color:#fff; border:none; border-radius:8px; font-weight:bold;">ACESSAR</button>
    </section>

    <div id="view-2" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="chat-area" id="chat-area"></div>
      <div id="typing" style="display:none; padding:10px; font-style:italic;">Digitando...</div>
      <div class="footer-bar">
        <div class="input-wrapper"><input id="chat-input" placeholder="Mensagem"></div>
        <button id="chat-send" class="send-btn">➤</button>
      </div>
    </div>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnpX_1E_Rl8WpKjJYA-qECY9gc9XizO51MHSagv-9Lm2ckEmLVypx6b254ONVK5Z4ieAEE74hmcFbZ/pub?gid=0&single=true&output=csv";
    const RENDER_API_URL = "https://botsgp.onrender.com/chat"; 
    
    let faqData = [];
    let userName = "";

    function addMsg(txt, type, isHTML = false) {
      const chat = document.getElementById("chat-area");
      const div = document.createElement("div");
      div.className = "msg " + type;
      if (isHTML) div.innerHTML = txt; else div.textContent = txt;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function startApp() {
      userName = document.getElementById("nome").value.trim();
      if (!userName) return alert("Nome obrigatório");
      document.getElementById("view-1").style.display = "none";
      document.getElementById("view-2").style.display = "flex";
      
      const r = await fetch(CSV_URL);
      const csv = await r.text();
      faqData = csv.split("\n").slice(1).map(l => {
        const c = l.split(",");
        return { cat: c[4], sub: c[5], p: c[1], r: c[3] };
      });
      addMsg(`E aí ${userName}! Como posso te ajudar hoje?`, "bot");
    }

    async function onSend() {
      const input = document.getElementById("chat-input");
      const val = input.value.trim();
      if (!val) return;

      addMsg(val, "user");
      input.value = "";
      document.getElementById("typing").style.display = "block";

      const res = await fetch(RENDER_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pergunta: val, nome: userName, base_conhecimento: faqData })
      });

      const data = await res.json();
      document.getElementById("typing").style.display = "none";
      renderResponse(data.resposta);
    }

    function renderResponse(text) {
      const regexBotao = /\[BOTÃO: (.*?)\]/g;
      let botoes = [];
      let match;
      while ((match = regexBotao.exec(text)) !== null) botoes.push(match[1]);

      const textoLimpo = text.replace(regexBotao, '').trim();
      addMsg(textoLimpo, "bot");

      if (botoes.length > 0) {
        const container = document.createElement("div");
        botoes.forEach(opt => {
          const btn = document.createElement("button");
          btn.className = "dynamic-button";
          btn.innerText = opt;
          btn.onclick = () => { document.getElementById("chat-input").value = opt; onSend(); container.remove(); };
          container.appendChild(btn);
        });
        document.getElementById("chat-area").appendChild(container);
      }
    }

    document.getElementById("chat-send").onclick = onSend;
    document.getElementById("chat-input").onkeypress = (e) => { if(e.key === 'Enter') onSend(); };
  </script>
</body>
</html>
