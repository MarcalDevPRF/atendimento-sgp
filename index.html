<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>SGP BOT - Oficial</title>
  <style>
    :root { --wa-dark: #075E54; --wa-teal: #128C7E; --wa-chat-bg: #E5DDD5; --wa-msg-user: #DCF8C6; --wa-msg-bot: #FFFFFF; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--wa-chat-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    header { background: var(--wa-dark); color: #fff; padding: 15px; text-align: center; font-weight: bold; }
    .chat-area { flex: 1; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 10px; margin: 8px 0; font-size: 16px; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: var(--wa-msg-user); border-top-right-radius: 0; }
    .msg.bot { align-self: flex-start; background: var(--wa-msg-bot); border-top-left-radius: 0; }
    .media-card { width: 100%; margin-top: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; background: #fff; max-width: 300px; }
    .media-card img { width: 100%; display: block; object-fit: contain; background: #eee; }
    .media-btn { display: block; text-align: center; padding: 12px; background: #f8f9fa; color: var(--wa-teal); text-decoration: none; font-weight: bold; font-size: 13px; border-top: 1px solid #eee; }
    .dynamic-button { display: inline-block; padding: 10px 16px; margin: 5px 4px; border-radius: 20px; border: 2px solid var(--wa-teal); background: white; color: var(--wa-teal); font-weight: bold; cursor: pointer; font-size: 13px; }
    .footer-bar { background: #f0f2f5; padding: 15px; display: flex; align-items: center; gap: 12px; }
    .input-wrapper { flex: 1; background: #fff; border-radius: 30px; padding: 5px 20px; }
    .input-wrapper input { width: 100%; border: none; padding: 12px 0; outline: none; font-size: 16px; }
    .send-btn { background: var(--wa-teal); color: #fff; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
  </style>
</head>
<body>
  <header>SGP BOT</header>
  <main style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <section id="view-1" style="padding: 30px; margin: auto; background: #fff; border-radius: 12px; width: 90%; max-width: 400px;">
        <input id="nome" placeholder="Seu nome" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px;">
        <input id="matricula" placeholder="Matrícula" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px;">
        <button onclick="startApp()" style="width:100%; padding:12px; background:var(--wa-teal); color:#fff; border:none; border-radius:8px; font-weight:bold;">ENTRAR</button>
    </section>

    <div id="view-2" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="chat-area" id="chat-area"></div>
      <div id="typing" style="display:none; padding:10px 20px; font-style:italic; font-size:12px;">SGP Bot está processando...</div>
      <div class="footer-bar">
        <div class="input-wrapper"><input id="chat-input" placeholder="Digite sua dúvida..."></div>
        <button onclick="onSend()" class="send-btn">🚀</button>
      </div>
    </div>
  </main>

  <script>
    const CSV_URL = "SUA_URL_DO_CSV_AQUI";
    const RENDER_API_URL = "https://botsgp.onrender.com/chat";
    let faqData = [], userName = "", userMatricula = "", conversationHistory = "";

    async function preLoadData() {
        const r = await fetch(CSV_URL);
        const csv = await r.text();
        const rows = csv.split(/\r?\n/).slice(1);
        faqData = rows.map(row => {
            const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return { pergunta: c[1], tags: c[2], resposta: c[3], cat: c[4], sub: c[5] };
        }).filter(f => f.resposta);
    }
    preLoadData();

    function startApp() {
        userName = document.getElementById("nome").value;
        userMatricula = document.getElementById("matricula").value;
        if(!userName || !userMatricula) return alert("Preencha tudo");
        document.getElementById("view-1").style.display = "none";
        document.getElementById("view-2").style.display = "flex";
        addMsg(`Olá ${userName}! Como posso ajudar?`, "bot");
    }

    async function onSend(texto = null) {
        const input = document.getElementById("chat-input");
        const val = texto || input.value.trim();
        if(!val) return;
        addMsg(val, "user");
        input.value = "";
        document.getElementById("typing").style.display = "block";

        const res = await fetch(RENDER_API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ pergunta: val, nome: userName, base_conhecimento: faqData })
        });
        const data = await res.json();
        document.getElementById("typing").style.display = "none";
        renderResponse(data.resposta);
    }

    // AJUSTE PARA GOOGLE DRIVE: Converte link de visualização em link direto de imagem
    function formatDriveUrl(url) {
        if (url.includes("drive.google.com")) {
            const idMatch = url.match(/\/d\/(.+?)\/(?:view|edit|usp)/) || url.match(/id=(.+?)(?:&|$)/);
            if (idMatch && idMatch[1]) {
                return `https://lh3.googleusercontent.com/u/0/d/${idMatch[1]}=w1000`;
            }
        }
        return url;
    }

    function renderResponse(text) {
        const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp)|https?:\/\/drive\.google\.com\/file\/d\/[^\s]+)/gi;
        const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
        
        const matchImg = text.match(imgRegex);
        const matchVideo = text.match(ytRegex) || (text.trim().length === 11 && !text.includes(" ") ? [text.trim(), text.trim()] : null);
        
        const regexBotao = /\[BOTÃO: (.*?)\]/g;
        let botoes = [];
        let matchBtn;
        while ((matchBtn = regexBotao.exec(text)) !== null) botoes.push(matchBtn[1]);

        let textoLimpo = text.replace(regexBotao, '').replace(ytRegex, '').replace(imgRegex, '').trim();
        addMsg(textoLimpo || "Aqui está o que encontrei:", "bot");

        if (matchImg) {
            matchImg.forEach(url => {
                const directUrl = formatDriveUrl(url);
                addMsg(`<div class="media-card"><img src="${directUrl}"><a href="${url}" target="_blank" class="media-btn">📥 ABRIR/BAIXAR ORIGINAL</a></div>`, "bot", true);
            });
        }

        if (matchVideo) {
            addMsg(`<div class="media-card"><img src="https://img.youtube.com/vi/${matchVideo[1]}/hqdefault.jpg"><a href="https://youtu.be/${matchVideo[1]}" target="_blank" class="media-btn" style="color:red">▶ ASSISTIR VÍDEO</a></div>`, "bot", true);
        }

        if (text.includes("resolveu sua dúvida?")) {
            const container = document.createElement("div");
            container.innerHTML = `
                <button class="dynamic-button" onclick="this.parentElement.remove(); addMsg('Ótimo! 👋', 'bot')">Sim, resolveu!</button>
                <button class="dynamic-button" onclick="this.parentElement.remove(); addMsg('Entendido. Como prefere prosseguir?', 'bot'); createSupportButtons();">Não, preciso de ajuda</button>
            `;
            document.getElementById("chat-area").appendChild(container);
        } else if (botoes.length > 0) {
            const container = document.createElement("div");
            botoes.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "dynamic-button";
                btn.innerText = opt;
                btn.onclick = () => { container.remove(); onSend(opt); };
                container.appendChild(btn);
            });
            document.getElementById("chat-area").appendChild(container);
        }
        document.getElementById("chat-area").scrollTop = document.getElementById("chat-area").scrollHeight;
    }

    function createSupportButtons() {
        const container = document.createElement("div");
        container.innerHTML = `
            <button class="dynamic-button" style="background:#25D366;color:white" onclick="window.open('https://wa.me/5561992282334?text=${encodeURIComponent('*RESUMO SGP BOT*\\n' + conversationHistory)}')">Falar no WhatsApp</button>
            <button class="dynamic-button" onclick="this.parentElement.remove(); addMsg('Pode fazer outra pergunta!', 'bot')">Nova Pergunta</button>
        `;
        document.getElementById("chat-area").appendChild(container);
    }

    function addMsg(t, type, html = false) {
        const area = document.getElementById("chat-area");
        const d = document.createElement("div");
        d.className = "msg " + type;
        if(html) d.innerHTML = t; else d.textContent = t;
        area.appendChild(d);
        if(!html) conversationHistory += (type === "user" ? "VOCÊ: " : "BOT: ") + t + "\n";
        area.scrollTop = area.scrollHeight;
    }
  </script>
</body>
</html>
