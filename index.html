<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>SGP BOT - Oficial</title>
  <style>
    /* ... (Mantém os estilos anteriores que já funcionam bem) ... */
    :root { --wa-dark: #075E54; --wa-teal: #128C7E; --wa-chat-bg: #E5DDD5; --wa-msg-user: #DCF8C6; --wa-msg-bot: #FFFFFF; --radius: 12px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--wa-chat-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    header { background-color: var(--wa-dark); color: #fff; padding: 15px; text-align: center; font-weight: bold; }
    .chat-area { flex: 1; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 10px; margin: 8px 0; font-size: 16px; line-height: 1.4; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: var(--wa-msg-user); border-top-right-radius: 0; }
    .msg.bot { align-self: flex-start; background: var(--wa-msg-bot); border-top-left-radius: 0; }
    .media-card { width: 100%; margin-top: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; background: #fff; max-width: 300px; }
    .media-card img { width: 100%; display: block; }
    .media-btn { display: block; text-align: center; padding: 12px; background: #f8f9fa; color: var(--wa-teal); text-decoration: none; font-weight: bold; font-size: 13px; border-top: 1px solid #eee; }
    .dynamic-button { display: inline-block; padding: 10px 16px; margin: 5px 4px; border-radius: 20px; border: 2px solid var(--wa-teal); background: white; color: var(--wa-teal); font-weight: bold; cursor: pointer; font-size: 13px; }
    .footer-bar { background: #f0f2f5; padding: 15px; display: flex; align-items: center; gap: 12px; }
    .input-wrapper { flex: 1; background: #fff; border-radius: 30px; padding: 5px 20px; }
    .input-wrapper input { width: 100%; border: none; padding: 12px 0; outline: none; font-size: 16px; }
    .send-btn { background: var(--wa-teal); color: #fff; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .view-card { background: #fff; border-radius: var(--radius); padding: 30px; width: 90%; max-width: 400px; margin: auto; }
    .form-input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
  </style>
</head>
<body>

  <header>SGP BOT - SGP-SEDE</header>

  <main style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <section id="view-1" class="view-card">
      <input id="nome" class="form-input" placeholder="Seu nome">
      <input id="matricula" class="form-input" type="tel" placeholder="Matrícula">
      <button onclick="startApp()" style="width:100%; padding:15px; background:var(--wa-teal); color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ACESSAR</button>
    </section>

    <div id="view-2" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="chat-area" id="chat-area"></div>
      <div id="typing" style="display:none; padding:10px 20px; font-style:italic; font-size:13px;">SGP Bot está processando...</div>
      <div class="footer-bar">
        <div class="input-wrapper"><input id="chat-input" placeholder="Digite sua dúvida..."></div>
        <button id="chat-send" class="send-btn">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnpX_1E_Rl8WpKjJYA-qECY9gc9XizO51MHSagv-9Lm2ckEmLVypx6b254ONVK5Z4ieAEE74hmcFbZ/pub?gid=0&single=true&output=csv";
    const RENDER_API_URL = "https://botsgp.onrender.com/chat"; 
    
    let faqData = [];
    let userName = "";

    async function startApp() {
      userName = document.getElementById("nome").value.trim();
      const mat = document.getElementById("matricula").value.trim();
      if (!userName || !mat) return alert("Preencha tudo.");
      
      document.getElementById("view-1").style.display = "none";
      document.getElementById("view-2").style.display = "flex";
      
      try {
        const r = await fetch(CSV_URL);
        const csv = await r.text();
        
        // CORREÇÃO DE LEITURA DO CSV (Baseado no ficheiro enviado)
        const rows = csv.split(/\r?\n/).slice(1);
        faqData = rows.map(row => {
          // Regex para separar colunas respeitando aspas
          const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          return { 
            pergunta: c[1]?.replace(/"/g, "").trim(),
            tags: c[2]?.replace(/"/g, "").trim(),        // palavras_chave agora é índice 2
            resposta: c[3]?.replace(/"/g, "").trim(),    // respostas agora é índice 3
            categoria: c[4]?.replace(/"/g, "").trim(),   // categoria índice 4
            subcategoria: c[5]?.replace(/"/g, "").trim() // sub_categoria índice 5
          };
        }).filter(f => f.resposta);

        addMsg(`Olá ${userName}! Sou o SGP Bot. Como posso ajudar hoje?`, "bot");
      } catch(e) { addMsg("Erro ao carregar base.", "bot"); }
    }

    // ... (Mantém funções onSend, createWhatsAppButton e lógica de eventos) ...

    async function onSend(textoManual = null) {
      const input = document.getElementById("chat-input");
      const val = textoManual || input.value.trim();
      if (!val) return;
      addMsg(val, "user");
      if (!textoManual) input.value = "";
      document.getElementById("typing").style.display = "block";

      const res = await fetch(RENDER_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pergunta: val, nome: userName, base_conhecimento: faqData })
      });
      const data = await res.json();
      document.getElementById("typing").style.display = "none";
      renderResponse(data.resposta);
    }

    function renderResponse(text) {
      // Mesma lógica de renderização de Mídia e Botões que discutimos
      const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i;
      const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
      const matchVideo = text.match(ytRegex) || (text.trim().length === 11 && !text.includes(" ") ? [text.trim(), text.trim()] : null);
      const matchImg = text.match(imgRegex);
      const regexBotao = /\[BOTÃO: (.*?)\]/g;
      
      let botoes = [];
      let matchBtn;
      while ((matchBtn = regexBotao.exec(text)) !== null) botoes.push(matchBtn[1]);

      let textoLimpo = text.replace(regexBotao, '').replace(ytRegex, '').replace(imgRegex, '').trim();
      addMsg(textoLimpo || "Aqui está:", "bot");

      if (matchImg) addMsg(`<div class="media-card"><img src="${matchImg[1]}"><a href="${matchImg[1]}" target="_blank" class="media-btn">📥 BAIXAR</a></div>`, "bot", true);
      
      if (matchVideo) {
        const id = matchVideo[1];
        addMsg(`<div class="media-card"><img src="https://img.youtube.com/vi/${id}/hqdefault.jpg"><a href="https://youtu.be/${id}" target="_blank" class="media-btn" style="color:red">▶ VÍDEO</a></div>`, "bot", true);
      }

      if (text.includes("resolveu sua dúvida?")) {
          botoes.push("Sim, resolveu!", "Não, preciso de ajuda");
      }

      if (botoes.length > 0) {
        const container = document.createElement("div");
        botoes.forEach(opt => {
          const btn = document.createElement("button");
          btn.className = "dynamic-button";
          btn.innerText = opt;
          btn.onclick = () => { container.remove(); onSend(opt); };
          container.appendChild(btn);
        });
        document.getElementById("chat-area").appendChild(container);
      }
    }

    document.getElementById("chat-send").onclick = () => onSend();
    document.getElementById("chat-input").onkeypress = (e) => { if(e.key === 'Enter') onSend(); };
  </script>
</body>
</html>
